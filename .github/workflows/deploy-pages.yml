name: Deploy Recife History Connections to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'data-visualization/recife-history-connections/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Prepare site structure
        run: |
          mkdir -p _site/data-visualization/recife-history-connections
          cp -r data-visualization/recife-history-connections/. _site/data-visualization/recife-history-connections/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
